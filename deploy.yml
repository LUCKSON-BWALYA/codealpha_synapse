#------ docker-compose.yml -------------------

version "3.9"

services: 

# -------------- node.js backend ----------------------

app:
   build:
      context: ./backend
      dockerfiles: dockerfiles
    container_name: synapse-backend
    restart: unless-stopped
    environment:
      NODE_ENV:  product
      PORT:      4000
      CLIENT_URL: ${CLIENT_URL}
      JWT_ACCESS_SECRET:  ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_TTL:     1h
      JWT_REFRESH_TTL:    7d
      REDIS_HOST:         redis
      REDIS_PORT:         6379
      REDIS_PASSWORD:     ${REDIS_PASSWORD}
      TURN_URL:           ${TURN_URL}
      TURN_SECRET:        ${TURN_SECRET}
    depends_on: 
      redis:
       condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval:     30s
      timeout:       5s
      retries:       3

#------- react frontend -------------------------
frontend:
   build: 
      context: ./frontend
      dockerfile: dockerfile
      args:
      REACT_APP_SIGNAL_URL:      ${REACT_APP_SIGNAL_URL}
      REACT_APP_API_URL:         ${REACT_APP_API_URL}
      REACT_APP_TURN_URL:        ${TURN_URL}
      RAECT_APP_TURN_USERNAME:   ${TURN_USERNAME} 
      RAECT_APP_TURN_CREDENTIAL: ${TURN_CREDENTIAL} 
  container_name:  connectapp-frontend
  restart: unless-stopped
  networks:
    -internal

# -------- Redis ---------------------------------
redis:
  image: redis: 7-alpine
  container_name: connectapp-redis
  restart: unless-stopped
  command: redis-server -requirepass ${REDIS_PASSWORD} -appendonly yes
  volumes:
     -redis_data:/data 
  networks: 
     -internal
  healthcheck:
    test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
    interval: 10s
    timeout:  3s
    retries:  5

#---------- coturn TURN server --------------------

coturn: 
  image: coturn/coturn:latest
  container_name: connectapp-coturn
  restart: unless-stopped
  network_mode: host  #TURN needs direct UDP acess
  volumes: 
    -./coturn/turnserver.conf:/etc/turnserver.conf:ro
    -./coturn/certs:/etc/coturn/certs:ro 
  command: -c /etc/turnserver.conf

#---------- Nginx reverse proxy ---------------------------

nginx: 
  image: mginx:1.25-alpine
  container_name: connectapp-nginx
  restart: unless-stopped
  ports:
    -"80:80"
    -"443:443"
  volumes:
    -./nginx/nginx.conf:/etc/nginx/nginx.conf:ro 
    -./nginx/certs:/etc/nginx/certs:ro 
    -nginx_logs:/var/log/nginx
  depends_on:
    - app
    - frontend 
  networks:
    - internal
    -external 

volumes: 
  redis_data
  nginx_logs 

networks: 
  internal: 
    drver:bridge
  external: 
    driver: bridge 

#---------- backend/Dockerfile ----------------------

FROM node:20-apline AS base
WORKDIR /app
RUN apk add -no-cache curl 

# dependencies 

FROM base AS deps 
COPY package*.json ./
RUN npm ci -only=production

# Runtime 
FROM base AS runtime 
COPY -from=deps /app/node_modules ./node_modules
COPY ..
RUN addgroup -g 1001 -S nodejs && adduser -S nodejs -u 1001
USER nodejs
EXPOSE 4000
CMD ["node", "server.js"] 

#------------- frontend /Dockerfile ---------------------------

FROM node:20-alpine AS builder 
WORKDIR /app 
ARG REACT_APP_SIGNAL_URL
ARG REACT_APP_API_URL
ARG REACT_APP_TURN_URL
ARG RAECT_APP_TURN_USERNAME
ARG RAECT_APP_TURN_CREDENTIAL
COPY package*.json ./
RUN npm ci 
COPY ..
RUN npm run build

FROM nginx:1,25-alpine AS runtime 
COPY -from=builder /app/build /usr/share/nginx/html
COPY nginx-spa.conf /etc/nginx/conf.d/default.conf 
EXPOSE 80

#----------- nginx/nginx.conf -------------------------

# Main nginx conf: HTTPs termination + WebSocket proxy

events { worker_connections 1024;}

http {
  #Security headers (phase 4)
  add_header Strict-Transport-Security "max-age=63072000; includeSubdomains; preload" always;
  add_header X-content-Type-Options  "nosniff"                                        always;
  add_header X-frame-Options         "DENY"                                           always;
  add_header Refferrer-Policy        "strict-origin-when-cross-orgin"                 always;
  add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()"       always;

  #Gzip
  gzip on;
  gzip_types text/plain text/css application/json application/javascript;

  #WebSocket upstream (Socket.io)
  upstream backend{
    server app:4000;
    keepalive 64;
  }

  upstream frontend{
    server frontend:80;
  }

  #----HTTP `n HTTPS redirecction -------------
  server{
    listen 80;
    seerver_name yourdomain.com www.yourdomain.com;
    return 301 https://$host$request_uri;
  }

  #--------HTTPS ----------------------------
  server{
    listen 443 ssl http2;
    seerver_name yourdomain.com www.yourdomain.com;

    ssl_certificate  /etc/nginx/certs/fullchain.pem
    ssl_certificate_key  /etc/nginx/certs/privkey.pem
    ssl_protocols   TLSv1.2 tLSv1.3;
    ssl_chipers   ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache  shared:SSL:10m;

    #React SPA
    location/{
      proxy_pass http://frontend;
      proxy_set_header Host $host;
      try_files $uri/ /index.html
    }

    # RESt API
    location /api/ {
      proxy_pass       http://backend;
      proxy_http_version 1.1;
      proxy_set_header      Host       $host;
      proxy_set_header      X-Real-IP       $remote_addr;
      proxy_set_header      X-Forwarded-For       $proxy_add_x_forwarded_for;
      proxy_set_header      X-Forwarded-proto     $scheme;
    }

    #socket.io WebSocket upgrade
    location /socket.io/{
      proxy_pass       http://backend;
      proxy_http_version 1.1;
      proxy_set_header      Upgrade       $http_upgrade;
      proxy_set_header      Connection "upgrade";
      proxy_set_header      Host          $host;
      proxy_read_timeout    3600s;
      proxy_send_timeout    3600s; 
    }
  }
}

#-------------coturn/turnserver.conf ----------------------------
listening-port=3478
tls-listening-port=5349

#server's public IP
external-ip=SERVER_PUBLIC_IP

#domain
realm=turn.yourdomain.com
server-name=turn.yourdomain.com

#TLS certificates
cert=/etc/coturn/certs/fullchain.pem 
pkey=/etc/coturn/certs/privkey.pem 

#HMAC-based time-limited
use-auth-secret 
static-auth-secret=YOUR_TURN_SECRET 

#Security
no-multicast-peers 
no-loopback-peers 
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.

#Logging
log-file=/var/log/turnserver.log
verbose

#ports 
#UDP:3478, 49152-65535
#TCP:3478, 5349
min-port=49152
max-port=65535